<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>अनुष्का डिजिटल नेवता - बुकिंग</title>
    <style>
        * { box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background-color: #fdfbf0; color: #333; }
        
        /* होमपेज - फुल स्क्रीन */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), 
                        url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1920');
            background-size: cover; background-position: center;
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        .brand-name { font-size: 3.5rem; font-weight: bold; background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
        .booking-btn { padding: 18px 50px; font-size: 1.3rem; color: #000; background: linear-gradient(to right, #d4af37, #f9d976); border: none; border-radius: 50px; cursor: pointer; font-weight: bold; text-decoration: none; transition: 0.3s; box-shadow: 0 5px 20px rgba(212, 175, 55, 0.5); }
        .booking-btn:hover { transform: scale(1.05); }

        /* बुकिंग सेक्शन */
        .booking-section { padding: 60px 20px; min-height: 100vh; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); overflow: hidden; }
        .header { background: #000; color: #d4af37; padding: 25px; text-align: center; border-bottom: 4px solid #d4af37; }
        .content { padding: 30px; }
        
        label { display: block; margin-top: 15px; font-weight: bold; color: #aa771c; }
        input, select { width: 100%; padding: 14px; margin-top: 8px; border: 2px solid #eee; border-radius: 10px; font-size: 1rem; outline: none; transition: 0.3s; }
        input:focus { border-color: #d4af37; }

        .check-btn { width: 100%; padding: 16px; background: #000; color: #d4af37; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-top: 25px; transition: 0.3s; border: 1px solid #d4af37; }
        .check-btn:hover { background: #d4af37; color: #000; }
        
        .status-box { padding: 15px; margin-top: 20px; border-radius: 10px; display: none; text-align: center; font-weight: bold; }
        .available { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .booked { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
        
        .price-card { display: none; margin-top: 20px; padding: 20px; border: 2px dashed #d4af37; background: #fffdf5; border-radius: 15px; text-align: center; }
        .fare { font-size: 2rem; margin: 10px 0; color: #000; }
        .whatsapp-btn { background-color: #25D366; color: white; width: 100%; padding: 16px; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 15px; text-decoration: none; display: inline-block; transition: 0.3s; }

        /* एडमिन बटन */
        .footer-links { text-align: center; margin-top: 40px; padding-bottom: 40px; }
        .admin-btn { background: none; border: 1px solid #ccc; color: #999; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="hero">
        <h1 class="brand-name">अनुष्का डिजिटल नेवता</h1>
        <p style="color: #eee; font-size: 1.1rem; margin-bottom: 30px;">शादियों के लिए बेहतरीन गाड़ी बुकिंग</p>
        <a href="#booking" class="booking-btn">अपनी गाड़ी बुक करें</a>
    </div>

    <div id="booking" class="booking-section">
        <div class="container">
            <div class="header">
                <h2 style="margin:0;">गाड़ी बुकिंग</h2>
            </div>
            <div class="content">
                <label>गाड़ी का चयन करें:</label>
                <select id="carSelect">
                    <option value="Bolero_11">Bolero_11</option>
                    <option value="Scorpio">Scorpio</option>
                    <option value="Fortuner">Fortuner</option>
                    <option value="Innova">Innova</option>
                </select>

                <label>तारीख चुनें:</label>
                <input type="date" id="bookDate">

                <button class="check-btn" onclick="checkData()">चेक करें</button>

                <div id="statusResult" class="status-box"></div>

                <div id="priceInfo" class="price-card">
                    <p id="carDisplay" style="margin:0; color:#666;"></p>
                    <h2 id="fareDisplay" class="fare"></h2>
                    <a id="waLink" href="#" target="_blank" class="whatsapp-btn">✅ WhatsApp पर बुकिंग भेजें</a>
                </div>
            </div>
        </div>

        <div class="footer-links">
            <button class="admin-btn" onclick="adminLogin()">🔐 Owner Login</button>
            <br><br>
            <a href="#" style="color:#aa771c; text-decoration:none;">↑ वापस ऊपर जाएं</a>
        </div>
    </div>

<script>
    // आपका Google Sheet CSV लिंक
    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSDyvb-z7hge3objhHt8eBuUGbgvp7EEeHvqfl3fR0FlkK-YpkQB5fP3SRaAmtrH4Igx46QAKmGs5CR/pub?output=csv";
    
    // व्हाट्सएप नंबर (91 के साथ) - यहाँ अपना सही नंबर डालें
    const MY_PHONE = "918252483470"; 

    async function checkData() {
        const rawDate = document.getElementById('bookDate').value;
        const selectedCar = document.getElementById('carSelect').value;
        const statusBox = document.getElementById('statusResult');
        const priceBox = document.getElementById('priceInfo');

        if (!rawDate) { alert("कृपया तारीख चुनें!"); return; }

        // तारीख फॉर्मेटिंग (DD/MM/YYYY)
        const [y, m, d] = rawDate.split('-');
        const formattedDate = ${d}/${m}/${y};

        try {
            const response = await fetch(sheetURL);
            const csvData = await response.text();
            // CSV को रोज़ और कॉलम्स में बांटना
            const rows = csvData.split('\n').map(r => r.split(',').map(c => c.replace(/"/g, '').trim()));

            let isBooked = false;
            let currentFare = "संपर्क करें";

            // डेटा स्कैनिंग
            for (let i = 1; i < rows.length; i++) {
                const [sCar, sDate, sStatus, sPrice] = rows[i];
                if (sCar === selectedCar && sDate === formattedDate && sStatus === "Booked") {
                    isBooked = true;
                    break;
                }
                if (sCar === selectedCar) { currentFare = sPrice; }
            }

            statusBox.style.display = "block";
            if (isBooked) {
                statusBox.className = "status-box booked";
                statusBox.innerText = क्षमा करें! ${selectedCar} इस दिन (${formattedDate}) बुक है। ❌;
                priceBox.style.display = "none";
            } else {
                statusBox.className = "status-box available";
                statusBox.innerText = बधाई हो! ${selectedCar} उपलब्ध है। ✅;
                priceBox.style.display = "block";
                document.getElementById('carDisplay').innerHTML = गाड़ी: <b>${selectedCar}</b> | तारीख: <b>${formattedDate}</b>;
                document.getElementById('fareDisplay').innerText = ₹ ${currentFare}/-;
                
                // WhatsApp लिंक
                const msgText = नमस्ते अनुष्का डिजिटल नेवता,\nमैं गाड़ी बुक करना चाहता हूँ।\nगाड़ी: ${selectedCar}\nतारीख: ${formattedDate}\nकिराया: ₹${currentFare}/-;
                document.getElementById('waLink').href = https://wa.me/${MY_PHONE}?text=${encodeURIComponent(msgText)};
            }
        } catch (e) {
            alert("Error: डेटा लोड नहीं हो सका।");
        }
    }

    function adminLogin() {
        const pass = prompt("पासवर्ड दर्ज करें:");
        if (pass === "Anushka@2026") {
            window.open("https://docs.google.com/spreadsheets/d/1r9UjdyIEOZKz-88nYj4PQ_NeML9o_OKvJW7HQs3TlvQ/edit", "_blank");
        } else if (pass !== null) {
            alert("गलत पासवर्ड!");
        }
    }
</script>
</body>
</html>
