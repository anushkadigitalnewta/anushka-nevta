<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>अनुष्का डिजिटल नेवता - बुकिंग</title>
    <style>
        body { font-family: 'Poppins', sans-serif; margin: 0; background: #000; color: #fff; text-align: center; }
        
        /* ऊपर का हिस्सा */
        .hero { padding: 50px 20px; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&q=80&w=1000'); background-size: cover; border-bottom: 2px solid #d4af37; }
        .brand-name { font-size: 3rem; font-weight: bold; background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        
        /* बुकिंग बॉक्स */
        .container { max-width: 450px; margin: -50px auto 50px; background: #fff; color: #333; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3); position: relative; }
        label { display: block; text-align: left; margin-top: 15px; font-weight: bold; color: #aa771c; }
        select, input { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        
        .check-btn { width: 100%; padding: 15px; background: #aa771c; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.2rem; margin-top: 20px; transition: 0.3s; }
        .check-btn:hover { background: #000; color: #d4af37; }
        
        /* रिजल्ट और व्हाट्सएप */
        .status-box { padding: 15px; margin-top: 20px; border-radius: 8px; display: none; font-weight: bold; }
        .available { background: #d4edda; color: #155724; }
        .booked { background: #f8d7da; color: #721c24; }
        .price-box { display: none; margin-top: 15px; padding: 15px; border: 1px dashed #aa771c; background: #fff9e6; border-radius: 8px; }
        .whatsapp-btn { background-color: #25D366; color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; text-decoration: none; display: inline-block; }

        .admin-link { color: #888; text-decoration: none; font-size: 0.8rem; display: block; margin-top: 30px; }
    </style>
</head>
<body>

    <div class="hero">
        <h1 class="brand-name">अनुष्का डिजिटल नेवता</h1>
        <p>शादी बुकिंग सेवा</p>
    </div>

    <div class="container">
        <label>गाड़ी चुनें:</label>
        <select id="carSelect">
            <option value="Bolero_11">Bolero_11</option>
            <option value="Scorpio">Scorpio</option>
            <option value="Fortuner">Fortuner</option>
        </select>

        <label>तारीख चुनें:</label>
        <input type="date" id="bookDate">

        <button class="check-btn" onclick="checkData()">उपलब्धता देखें</button>

        <div id="statusResult" class="status-box"></div>

        <div id="priceInfo" class="price-box">
            <p id="carDisplay"></p>
            <h2 id="fareDisplay" style="margin: 5px 0;"></h2>
            <a id="waLink" href="#" target="_blank" class="whatsapp-btn">✅ व्हाट्सएप पर बुकिंग भेजें</a>
        </div>
        
        <a href="#" class="admin-link" onclick="adminLogin()">🔐 एडमिन लॉगिन</a>
    </div>

<script>
    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSDyvb-z7hge3objhHt8eBuUGbgvp7EEeHvqfl3fR0FlkK-YpkQB5fP3SRaAmtrH4Igx46QAKmGs5CR/pub?output=csv";
    const MY_PHONE = "918252483470"; // अपना नंबर यहाँ डालें

    async function checkData() {
        const rawDate = document.getElementById('bookDate').value;
        const selectedCar = document.getElementById('carSelect').value;
        const statusBox = document.getElementById('statusResult');
        const priceBox = document.getElementById('priceInfo');

        if (!rawDate) { alert("तारीख चुनें!"); return; }

        const [y, m, d] = rawDate.split('-');
        const formattedDate = ${d}/${m}/${y};

        try {
            const response = await fetch(sheetURL);
            const data = await response.text();
            const rows = data.split('\n').map(r => r.split(',').map(c => c.replace(/"/g, '').trim()));

            let isBooked = false;
            let currentFare = "संपर्क करें";

            for (let i = 1; i < rows.length; i++) {
                if (rows[i][0] === selectedCar && rows[i][1] === formattedDate && rows[i][2] === "Booked") {
                    isBooked = true; break;
                }
                if (rows[i][0] === selectedCar) { currentFare = rows[i][3]; }
            }

            statusBox.style.display = "block";
            if (isBooked) {
                statusBox.className = "status-box booked";
                statusBox.innerText = "यह गाड़ी बुक है! ❌";
                priceBox.style.display = "none";
            } else {
                statusBox.className = "status-box available";
                statusBox.innerText = "गाड़ी उपलब्ध है! ✅";
                priceBox.style.display = "block";
                document.getElementById('carDisplay').innerText = selectedCar + " (" + formattedDate + ")";
                document.getElementById('fareDisplay').innerText = "₹ " + currentFare;
                
                const msg = encodeURIComponent(नमस्ते अनुष्का डिजिटल नेवता, मैं ${selectedCar} बुक करना चाहता हूँ (${formattedDate})। किराया: ₹${currentFare});
                document.getElementById('waLink').href = "https://api.whatsapp.com/send?phone=" + MY_PHONE + "&text=" + msg;
            }
        } catch (e) { alert("इंटरनेट चेक करें!"); }
    }

    function adminLogin() {
        const pass = prompt("पासवर्ड:");
        if (pass === "Anushka@2026") window.open("https://docs.google.com/spreadsheets/d/1r9UjdyIEOZKz-88nYj4PQ_NeML9o_OKvJW7HQs3TlvQ/edit", "_blank");
    }
</script>
</body>
</html>
