<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anushka Digital Newta</title>
    <style>
        * { box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: sans-serif; margin: 0; background: #fdfbf0; color: #333; text-align: center; }
        
        /* नेविगेशन */
        nav { background: #000; padding: 15px; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #d4af37; display: flex; justify-content: center; gap: 15px; }
        nav a { color: #d4af37; text-decoration: none; font-weight: bold; cursor: pointer; font-size: 14px; }

        /* होम सेक्शन */
        .hero { height: 80vh; background: #111; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .brand { font-size: 40px; color: #d4af37; margin: 0; }
        .btn-go { background: #d4af37; color: #000; padding: 15px 30px; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 20px; display: inline-block; border: none; cursor: pointer; }

        /* फॉर्म सेक्शन */
        section { padding: 60px 20px; min-height: 100vh; }
        .card { max-width: 400px; margin: auto; background: #fff; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        .submit-btn { width: 100%; padding: 15px; background: #000; color: #d4af37; border: 1px solid #d4af37; font-weight: bold; cursor: pointer; border-radius: 5px; font-size: 18px; }
        
        /* रिजल्ट एरिया */
        .result-box { display: none; margin-top: 20px; padding: 15px; border-radius: 5px; font-weight: bold; }
        .available { background: #d4edda; color: #155724; }
        .booked { background: #f8d7da; color: #721c24; }
        .price-details { display: none; margin-top: 15px; background: #fff9e6; padding: 15px; border: 1px dashed #d4af37; }
        .wa-btn { background: #25D366; color: #fff; padding: 12px; text-decoration: none; display: block; border-radius: 5px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <nav>
        <a href="#home">होम</a>
        <a href="#booking">बुक करें</a>
        <a href="#contact">संपर्क</a>
        <a href="javascript:void(0)" onclick="adminLogin()">एडमिन</a>
    </nav>

    <div id="home" class="hero">
        <h1 class="brand">अनुष्का डिजिटल नेवता</h1>
        <p>शादियों के लिए गाड़ी बुकिंग</p>
        <a href="#booking" class="btn-go">गाड़ी बुक करें</a>
    </div>

    <section id="booking">

            <select id="car">
                <option value="Bolero_11">Bolero_11</option>
                <option value="Scorpio">Scorpio</option>
                <option value="Fortuner">Fortuner</option>
                <option value="Innova">Innova</option>
            </select>

            <label style="display:block; text-align:left;">तारीख चुनें:</label>
            <input type="date" id="date">

            <button id="checkBtn" class="submit-btn">चेक करें</button>

            <div id="status" class="result-box"></div>

            <div id="priceInfo" class="price-details">
                <p id="carText"></p>
                <h2 id="fareText" style="margin:5px 0;"></h2>
                <a id="waLink" href="#" target="_blank" class="wa-btn">व्हाट्सएप पर बुकिंग भेजें</a>
            </div>
        </div>
    </section>

            <p>📞 फोन: 8252483470</p>

            if (p === "Anushka@2026") {

</body>
</html>
